<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; line-height: 1.5; }
      label { display: block; margin-top: 12px; }
      input, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
      button { cursor: pointer; }
      .message { margin-top: 12px; }
      nav a { margin-right: 12px; }
    </style>
  </head>
  <body>
    <h1>Login</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/chat">Chat</a>
    </nav>

    <form id="login-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="parent@example.com" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" value="ParentPass123" required>

      <button type="submit">Login</button>
    </form>

    <p id="message" class="message"></p>

    <script>
      const form = document.getElementById("login-form");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "Logging in...";

        const body = new URLSearchParams();
        body.set("username", document.getElementById("email").value);
        body.set("password", document.getElementById("password").value);

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body
          });

          if (!response.ok) {
            throw new Error("Login failed");
          }

          const data = await response.json();
          localStorage.setItem("access_token", data.access_token);
          message.textContent = "Login successful. Redirecting...";
          window.location.href = "/dashboard";
        } catch (error) {
          message.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
